<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Your Vents | Vently</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#0d0d1a",
                        surface: "#1a1a2e",
                        primary: "#7c3aed",
                        "on-surface": "#e2e8f0",
                        muted: "#94a3b8",
                        error: "#ef4444"
                    },
                    fontFamily: {
                        h1: ["Space Grotesk", "sans-serif"],
                        h2: ["Space Grotesk", "sans-serif"],
                        body: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0d0d1a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .font-heading {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-nav {
            background: rgba(13, 13, 26, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .bottom-nav {
            background: rgba(13, 13, 26, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>

<body class="min-h-screen pb-20">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 glass-nav">
        <div class="flex justify-between items-center h-16 px-5 max-w-xl mx-auto">
            <a class="flex items-center gap-2" href="index.html">
                <span class="material-symbols-outlined text-primary text-2xl">bubble_chart</span>
                <span class="font-heading text-xl font-bold tracking-tight text-on-surface">Vently</span>
            </a>
            <button
                class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-error/40 text-error hover:bg-error/10 active:scale-95 transition-all text-xs font-semibold"
                id="logout-btn">
                <span class="material-symbols-outlined text-sm">logout</span>
                Logout
            </button>
        </div>
    </header>
    <!-- Main Content -->
    <main class="pt-24 px-5 max-w-xl mx-auto">
        <header class="mb-8">
            <h1 class="font-heading text-3xl font-bold text-on-surface mb-1">Your Vents</h1>
            <p class="text-muted text-base">Only you can see this page.</p>
        </header>
        <!-- Feed Container -->
        <div class="space-y-4" id="my-feed">
            <div class="flex flex-col items-center justify-center py-24 text-muted gap-4">
                <span class="material-symbols-outlined animate-spin text-primary/60 text-3xl">progress_activity</span>
                <span class="text-sm font-medium tracking-wide">Loading your vents...</span>
            </div>
        </div>
    </main>
    <!-- Bottom Navigation (Mobile Focused) -->
    <nav class="fixed bottom-0 w-full z-50 bottom-nav safe-area-inset-bottom">
        <div class="flex justify-around items-center h-16 max-w-xl mx-auto px-4">
            <a class="text-muted hover:text-primary transition-colors flex flex-col items-center gap-0.5"
                href="index.html">
                <span class="material-symbols-outlined text-[28px]">home</span>
            </a>
            <a class="text-muted hover:text-primary transition-colors flex flex-col items-center gap-0.5"
                href="search.html">
                <span class="material-symbols-outlined text-[28px]">search</span>
            </a>
            <a class="text-primary flex flex-col items-center gap-0.5" href="profile.html">
                <span class="material-symbols-outlined text-[28px]"
                    style="font-variation-settings: 'FILL' 1;">account_circle</span>
            </a>
            <a class="text-muted hover:text-primary transition-colors flex flex-col items-center gap-0.5"
                href="settings.html">
                <span class="material-symbols-outlined text-[28px]">settings</span>
            </a>
        </div>
    </nav>
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script src="profile.js"></script>
    <script>
        document.getElementById("logout-btn").addEventListener("click", () => {
            if (typeof logout === "function") {
                logout();
            } else {
                console.log("Logout function not found");
            }
        });
    </script>
</body>

</html>
