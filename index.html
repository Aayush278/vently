<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vently — Anonymous Vent Board</title>
    <meta name="description"
        content="Vently is a safe, anonymous space to let it out. Share your feelings without judgment." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />

    <style>
        /* ─── Reset & Root ─────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d1a;
            --card: #1a1a2e;
            --card-hover: #1f1f38;
            --accent: #7c3aed;
            --accent-glow: #7c3aed44;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: #2d2d4e;

            --anxious: #f59e0b;
            --sad: #3b82f6;
            --angry: #ef4444;
            --lost: #6b7280;
            --hopeful: #10b981;

            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;

            --transition: 0.2s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── Scrollbar ─────────────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 99px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ─── Background ambient glow ───────────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 400px;
            background: radial-gradient(ellipse, #7c3aed1a 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Layout ─────────────────────────────────────────────────── */
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px;
            position: relative;
            z-index: 1;
        }

        /* ─── Header ─────────────────────────────────────────────────── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 13, 26, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse-dot 2.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: 0.7;
            }
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Profile link */
        #profile-link {
            display: none;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            transition: color var(--transition), background var(--transition);
        }

        #profile-link:hover {
            color: var(--text);
            background: var(--card);
        }

        #profile-link .icon {
            font-size: 1rem;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #6d28d9;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: var(--accent);
            background: rgba(124, 58, 237, 0.08);
        }

        .btn-full {
            width: 100%;
        }

        #login-btn {
            /* visible by default */
        }

        #logout-btn {
            display: none;
        }

        /* ─── Hero tagline ───────────────────────────────────────────── */
        .hero {
            padding: 48px 0 24px;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            color: var(--muted);
            font-size: 1rem;
            max-width: 380px;
            margin: 0 auto;
        }

        /* ─── Section spacing ────────────────────────────────────────── */
        .section {
            margin-bottom: 20px;
        }

        /* ─── Post Box ───────────────────────────────────────────────── */
        #post-box {
            display: none;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            animation: fadeSlideIn 0.35s ease;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #post-box .box-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 14px;
        }

        #vent-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            padding: 14px 16px;
            resize: none;
            min-height: 110px;
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }

        #vent-input::placeholder {
            color: var(--muted);
        }

        #vent-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .char-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 6px;
            margin-bottom: 14px;
        }

        #char-count {
            font-size: 0.75rem;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            transition: color var(--transition);
        }

        #char-count.warn {
            color: var(--anxious);
        }

        #char-count.limit {
            color: var(--angry);
        }

        .mood-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 10px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .mood-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .mood-chip {
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid transparent;
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
            transition: all var(--transition);
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .mood-chip:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Mood chip active states */
        .mood-chip[data-mood="anxious"].active,
        .mood-chip[data-filter="anxious"].active {
            background: rgba(245, 158, 11, 0.15);
            border-color: var(--anxious);
            color: var(--anxious);
        }

        .mood-chip[data-mood="sad"].active,
        .mood-chip[data-filter="sad"].active {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--sad);
            color: var(--sad);
        }

        .mood-chip[data-mood="angry"].active,
        .mood-chip[data-filter="angry"].active {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--angry);
            color: var(--angry);
        }

        .mood-chip[data-mood="lost"].active,
        .mood-chip[data-filter="lost"].active {
            background: rgba(107, 114, 128, 0.2);
            border-color: var(--lost);
            color: var(--lost);
        }

        .mood-chip[data-mood="hopeful"].active,
        .mood-chip[data-filter="hopeful"].active {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--hopeful);
            color: var(--hopeful);
        }

        .mood-chip[data-filter="all"].active {
            background: rgba(124, 58, 237, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ─── Filter Bar ─────────────────────────────────────────────── */
        .filter-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-bottom: 20px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .filter-bar .mood-chip {
            flex-shrink: 0;
        }

        /* ─── Divider ─────────────────────────────────────────────────── */
        .section-heading {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .section-heading span {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
        }

        .section-heading::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ─── Feed ───────────────────────────────────────────────────── */
        #feed {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: 60px;
        }

        .feed-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .feed-empty .emoji {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
        }

        /* ─── Vent Card ──────────────────────────────────────────────── */
        .vent-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px 20px 14px;
            transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
            animation: cardIn 0.3s ease both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .vent-card:hover {
            transform: translateY(-2px);
            border-color: rgba(124, 58, 237, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        /* Mood tag on cards */
        .mood-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .mood-tag.anxious {
            background: rgba(245, 158, 11, 0.12);
            color: var(--anxious);
        }

        .mood-tag.sad {
            background: rgba(59, 130, 246, 0.12);
            color: var(--sad);
        }

        .mood-tag.angry {
            background: rgba(239, 68, 68, 0.12);
            color: var(--angry);
        }

        .mood-tag.lost {
            background: rgba(107, 114, 128, 0.15);
            color: var(--lost);
        }

        .mood-tag.hopeful {
            background: rgba(16, 185, 129, 0.12);
            color: var(--hopeful);
        }

        .time-ago {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .vent-text {
            font-size: 0.975rem;
            line-height: 1.7;
            color: var(--text);
            margin-bottom: 14px;
            word-break: break-word;
        }

        /* Reaction bar */
        .reaction-bar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: 4px;
        }

        .reaction-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 4px 12px;
            font-size: 0.8rem;
            color: var(--muted);
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
        }

        .reaction-btn:hover {
            background: rgba(124, 58, 237, 0.12);
            border-color: var(--accent);
            color: var(--text);
            transform: scale(1.05);
        }

        .reaction-btn.reacted {
            background: rgba(124, 58, 237, 0.18);
            border-color: var(--accent);
            color: var(--accent);
        }

        .reaction-btn .emoji {
            font-size: 1rem;
        }

        .reaction-btn .count {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* ─── Loading state ──────────────────────────────────────────── */
        .loading-text {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ─── Skeleton loading cards ─────────────────────────────────── */
        .skeleton-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
        }

        .skeleton-line {
            background: linear-gradient(90deg, var(--border) 25%, rgba(255, 255, 255, 0.06) 50%, var(--border) 75%);
            background-size: 200% 100%;
            border-radius: 6px;
            animation: shimmer 1.5s infinite;
            height: 12px;
            margin-bottom: 10px;
        }

        .skeleton-line.w-1\/3 {
            width: 33%;
        }

        .skeleton-line.w-2\/3 {
            width: 66%;
        }

        .skeleton-line.w-full {
            width: 100%;
        }

        .skeleton-line.h-4 {
            height: 16px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* ─── Toast ──────────────────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 22px;
            border-radius: var(--radius-xl);
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 999;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            pointer-events: none;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ─── Footer ─────────────────────────────────────────────────── */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(13, 13, 26, 0.9);
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 10px;
            font-size: 0.72rem;
            color: var(--muted);
            z-index: 50;
        }

        /* ─── Responsive ─────────────────────────────────────────────── */
        @media (max-width: 480px) {
            .header-inner {
                height: 56px;
            }

            .logo {
                font-size: 1.3rem;
            }

            .hero {
                padding: 32px 0 18px;
            }

            .hero h1 {
                font-size: 1.6rem;
            }

            #post-box {
                padding: 16px;
                border-radius: var(--radius-md);
            }

            .vent-card {
                padding: 16px 16px 12px;
            }

            .btn {
                padding: 7px 14px;
                font-size: 0.82rem;
            }

            #profile-link {
                padding: 6px 8px;
            }
        }
    </style>
</head>

<body>

    <!-- ── Header ─────────────────────────────────── -->
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo">
                Vently<span class="logo-dot"></span>
            </a>
            <div class="header-actions">
                <a href="profile.html" id="profile-link">
                    <span class="icon">👤</span> My Profile
                </a>
                <button id="logout-btn" class="btn btn-ghost">Logout</button>
                <a href="login.html" id="login-btn" class="btn btn-primary">Login</a>
            </div>
        </div>
    </header>

    <!-- ── Main ───────────────────────────────────── -->
    <main>
        <div class="container">

            <!-- Hero tagline -->
            <div class="hero">
                <h1>A space to breathe.<br />No names. No judgment.</h1>
                <p>Say what you feel. Let it out anonymously and know you're not alone.</p>
            </div>

            <!-- Post Box (shown when logged in) -->
            <div id="post-box" class="section">
                <p class="box-label">✦ New Vent</p>
                <textarea id="vent-input" maxlength="280" placeholder="What's on your mind? Let it out…" rows="4"
                    aria-label="Write your vent"></textarea>
                <div class="char-row">
                    <span id="char-count">0 / 280</span>
                </div>
                <p class="mood-label">How are you feeling?</p>
                <div class="mood-chips">
                    <button class="mood-chip" data-mood="anxious">😰 Anxious</button>
                    <button class="mood-chip" data-mood="sad">💙 Sad</button>
                    <button class="mood-chip" data-mood="angry">🔥 Angry</button>
                    <button class="mood-chip" data-mood="lost">🌫️ Lost</button>
                    <button class="mood-chip" data-mood="hopeful">🌱 Hopeful</button>
                </div>
                <button id="post-btn" class="btn btn-primary btn-full">Post Anonymously 🕊️</button>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar section" role="group" aria-label="Filter vents by mood">
                <button class="mood-chip active" data-filter="all">✦ All</button>
                <button class="mood-chip" data-filter="anxious">😰 Anxious</button>
                <button class="mood-chip" data-filter="sad">💙 Sad</button>
                <button class="mood-chip" data-filter="angry">🔥 Angry</button>
                <button class="mood-chip" data-filter="lost">🌫️ Lost</button>
                <button class="mood-chip" data-filter="hopeful">🌱 Hopeful</button>
            </div>

            <!-- Section heading -->
            <div class="section-heading">
                <span>Recent Vents</span>
            </div>

            <!-- Feed -->
            <div id="feed">
                <div class="loading-text">
                    <div class="spinner"></div>
                    Loading vents…
                </div>
            </div>

        </div>
    </main>

    <!-- ── Footer ─────────────────────────────────── -->
    <footer>Made with 💜 · Vently · You are not alone.</footer>

    <!-- ── Toast ──────────────────────────────────── -->
    <div id="toast" role="status" aria-live="polite"></div>

    <!-- ── Scripts ────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
        // Character counter
        document.getElementById("vent-input").addEventListener("input", () => {
            const len = document.getElementById("vent-input").value.length;
            const counter = document.getElementById("char-count");
            counter.innerText = len + " / 280";
            counter.classList.remove("warn", "limit");
            if (len >= 260) counter.classList.add("limit");
            else if (len >= 200) counter.classList.add("warn");
        });

        // Mood chip selection
        document.querySelectorAll("#post-box .mood-chip").forEach(chip => {
            chip.addEventListener("click", () => {
                document.querySelectorAll("#post-box .mood-chip").forEach(c => c.classList.remove("active"));
                chip.classList.add("active");
            });
        });

        // Filter chips
        document.querySelectorAll(".filter-bar .mood-chip").forEach(chip => {
            chip.addEventListener("click", () => {
                document.querySelectorAll(".filter-bar .mood-chip").forEach(c => c.classList.remove("active"));
                chip.classList.add("active");
                const filter = chip.dataset.filter;
                if (typeof fetchVents === "function") {
                    fetchVents(filter === "all" ? null : filter);
                }
            });
        });

        // Logout button
        document.getElementById("logout-btn")?.addEventListener("click", () => {
            if (typeof logout === "function") logout();
        });
    </script>

</body>
